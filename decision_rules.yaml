    split: held_out_material
    target: target_displacement
    base_arm: vision_proprio
    touch_arm: vision_proprio_touch
    metric: mae
    pass_condition: "paired-bootstrap 95% CI for MAE improvement excludes 0 on the positive side"

  confirm_touch_helps_held_out_impulse_mass:
    type: touch_helps
    split: held_out_impulse_mass
    target: target_displacement
    base_arm: vision_proprio
    touch_arm: vision_proprio_touch
